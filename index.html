<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS DEPANNAGE — Remorquage & Dépannage Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --bg-primary: #08111f;
  --bg-secondary: #0d1a2e;
  --bg-card: #0f1e33;
  --bg-card-hover: #132540;
  --gold: #c9963a;
  --gold-light: #e0b55a;
  --gold-dark: #a07828;
  --text-primary: #f0e8d8;
  --text-muted: #8a9ab5;
  --text-light: #c8d4e8;
  --red-banner: #991b1b;
  --border: rgba(201, 150, 58, 0.2);
  --border-strong: rgba(201, 150, 58, 0.5);
  --shadow-gold: 0 0 40px rgba(201, 150, 58, 0.15);
  --radius: 4px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* =============================================
   TIMER BANNER (STICKY)
   ============================================= */
#timer-banner {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--red-banner);
  text-align: center;
  padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#timer-banner span.timer-label { opacity: 0.9; }
#timer-banner span.timer-count {
  font-size: 1rem;
  font-weight: 700;
  background: rgba(0,0,0,0.25);
  padding: 2px 10px;
  border-radius: 3px;
  letter-spacing: 0.1em;
  font-variant-numeric: tabular-nums;
}

/* =============================================
   NAVIGATION STICKY
   ============================================= */
nav {
  position: sticky;
  top: 41px;
  z-index: 999;
  background: rgba(8, 17, 31, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  transition: all var(--transition);
}

.nav-logo {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.nav-logo .logo-main {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}

.nav-logo .logo-sub {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  transition: color var(--transition);
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width var(--transition);
}

.nav-links a:hover { color: var(--text-primary); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--gold);
  color: #08111f;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: background var(--transition), transform var(--transition);
}

.nav-cta:hover {
  background: var(--gold-light);
  transform: translateY(-1px);
}

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text-primary);
  transition: all var(--transition);
}

/* =============================================
   HERO SECTION
   ============================================= */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 100px 5% 80px;
}

/* Animated background grid */
#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,150,58,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(13,26,46,0.8) 0%, transparent 70%);
  pointer-events: none;
}

/* Decorative lines */
#hero::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 40%;
  height: 100%;
  background: linear-gradient(135deg, transparent 40%, rgba(201,150,58,0.03) 100%);
  border-left: 1px solid var(--border);
  pointer-events: none;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
  position: relative;
  z-index: 2;
}

.hero-eyebrow::before {
  content: '';
  display: block;
  width: 30px;
  height: 1px;
  background: var(--gold);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 6rem);
  font-weight: 700;
  line-height: 1.05;
  margin-bottom: 28px;
  position: relative;
  z-index: 2;
  max-width: 750px;
}

.hero-title .italic-accent {
  font-style: italic;
  color: var(--gold);
}

.hero-title .line-under {
  position: relative;
  display: inline-block;
}

.hero-title .line-under::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.hero-subtitle {
  font-size: 1.1rem;
  color: var(--text-light);
  max-width: 520px;
  margin-bottom: 44px;
  line-height: 1.7;
  position: relative;
  z-index: 2;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 64px;
  position: relative;
  z-index: 2;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: #08111f;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  padding: 16px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: all var(--transition);
  border: 2px solid var(--gold);
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}

.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,150,58,0.35); }
.btn-primary:hover::before { width: 200px; height: 200px; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text-primary);
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  padding: 16px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  border: 2px solid var(--border-strong);
  transition: all var(--transition);
}

.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,150,58,0.05);
  transform: translateY(-2px);
}

/* Hero Stats */
.hero-stats {
  display: flex;
  gap: 0;
  position: relative;
  z-index: 2;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  width: fit-content;
  background: rgba(13, 26, 46, 0.6);
  backdrop-filter: blur(8px);
}

.stat-item {
  padding: 24px 36px;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}

.stat-item:last-child { border-right: none; }

.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

/* Scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  z-index: 2;
  animation: scrollBounce 2s infinite;
}

.scroll-hint::after {
  content: '';
  width: 1px;
  height: 50px;
  background: linear-gradient(to bottom, var(--gold), transparent);
}

@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(6px); }
}

/* =============================================
   TRUST RIBBON
   ============================================= */
#trust {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 24px 5%;
}

.trust-grid {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px 36px;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.trust-item .check {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(201,150,58,0.12);
  color: var(--gold);
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}

/* =============================================
   MARQUEE
   ============================================= */
#marquee-section {
  overflow: hidden;
  padding: 18px 0;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  position: relative;
}

.marquee-track {
  display: flex;
  gap: 60px;
  animation: marqueeScroll 28s linear infinite;
  width: max-content;
}

.marquee-track:hover { animation-play-state: paused; }

.marquee-item {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
}

.marquee-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

@keyframes marqueeScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* =============================================
   SERVICES SECTION
   ============================================= */
#services {
  padding: 100px 5%;
  position: relative;
}

.section-header {
  text-align: center;
  margin-bottom: 64px;
}

.section-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}

.section-eyebrow::before,
.section-eyebrow::after {
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-desc {
  color: var(--text-muted);
  font-size: 1rem;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* Services Grid */
.services-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.service-card {
  background: var(--bg-card);
  padding: 44px 40px;
  position: relative;
  overflow: hidden;
  transition: background var(--transition);
  cursor: default;
}

/* Animated gold line on hover */
.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.service-card:hover::before { width: 100%; }
.service-card:hover { background: var(--bg-card-hover); }

/* Top gold accent line */
.service-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 40px;
  width: 40px;
  height: 2px;
  background: var(--gold);
  opacity: 0.4;
}

.service-number {
  font-family: 'Playfair Display', serif;
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.2em;
  margin-bottom: 20px;
  opacity: 0.7;
}

.service-icon {
  font-size: 2rem;
  margin-bottom: 16px;
  display: block;
  filter: drop-shadow(0 0 8px rgba(201,150,58,0.3));
}

.service-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  line-height: 1.2;
}

.service-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.service-features {
  list-style: none;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.service-features li {
  font-size: 0.82rem;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.service-features li::before {
  content: '→';
  color: var(--gold);
  font-size: 0.7rem;
  flex-shrink: 0;
}

/* =============================================
   TESTIMONIALS
   ============================================= */
#testimonials {
  padding: 100px 5%;
  background: var(--bg-secondary);
  position: relative;
}

#testimonials::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 0;
}

.testimonial-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 36px 32px;
  position: relative;
  transition: all var(--transition);
}

.testimonial-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-4px);
  box-shadow: var(--shadow-gold);
}

.testimonial-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 28px;
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  color: var(--gold);
  opacity: 0.08;
  line-height: 1;
  font-weight: 700;
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.star { color: var(--gold); font-size: 0.9rem; }
.star.empty { color: var(--text-muted); opacity: 0.4; }

.testimonial-text {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.9rem;
  color: #08111f;
  flex-shrink: 0;
}

.author-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.author-date {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* =============================================
   CTA SECTION
   ============================================= */
#cta-section {
  padding: 100px 5%;
  position: relative;
  overflow: hidden;
}

#cta-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(201,150,58,0.04) 0%, transparent 70%);
}

.cta-container {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.cta-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4.5vw, 3.5rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 20px;
}

.cta-title em { font-style: italic; color: var(--gold); }

.cta-subtitle {
  font-size: 1.05rem;
  color: var(--text-muted);
  margin-bottom: 48px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}

/* Price Box */
.price-box {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  padding: 40px 60px;
  margin-bottom: 36px;
  position: relative;
  overflow: hidden;
}

.price-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.price-box-badge {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(201,150,58,0.1);
  padding: 6px 16px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.price-box-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.price-box-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.price-box-features {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
  text-align: left;
  width: 100%;
}

.price-box-features li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  color: var(--text-light);
  list-style: none;
}

.price-box-features li .pf-check {
  color: var(--gold);
  font-weight: 700;
  flex-shrink: 0;
}

.cta-phone-big {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  text-decoration: none;
  transition: all var(--transition);
  letter-spacing: -0.01em;
}

.cta-phone-big:hover {
  color: var(--gold-light);
  transform: scale(1.03);
}

.cta-small-note {
  margin-top: 16px;
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* =============================================
   FOOTER
   ============================================= */
footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 48px 5%;
}

.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 24px;
  margin-bottom: 32px;
}

.footer-logo .logo-main {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
  display: block;
  margin-bottom: 4px;
}

.footer-logo .logo-sub {
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.footer-contact {
  text-align: right;
}

.footer-phone {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold);
  text-decoration: none;
  transition: color var(--transition);
  margin-bottom: 6px;
  display: block;
}

.footer-phone:hover { color: var(--gold-light); }
